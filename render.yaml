services:
  - type: web
    name: agent-iva-sat
    env: python
    region: oregon
    plan: free
    buildCommand: apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libcairo2 libffi-dev shared-mime-info || true; pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --workers 1 --threads 4 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SESSIONS_DIR
        value: /tmp/agentiva
      - key: SECRET_KEY
        generateValue: true
